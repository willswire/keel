name: hello-stack

services:
  hello:
    build:
      context: .
      dockerfile: Dockerfile
    image: keel.local/hello:latest
    env_file:
      - .env
    environment:
      MESSAGE: "Hello from docker compose!"
    ports:
      - "8080:8080"
    volumes:
      - hello-data:/var/lib/hello
      - ./app-config.yml:/app/config.yml:ro
    secrets:
      - source: app_secret
        target: app-secret
    depends_on:
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "/app/server.py", "--healthcheck"]

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  debugger:
    image: busybox:1.36
    command: ["sh", "-c", "sleep infinity"]
    profiles: ["debug"]

volumes:
  hello-data: {}
  redis-data: {}

secrets:
  app_secret:
    file: ./app-secret.txt
