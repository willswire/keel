name: hello-stack

services:
  hello:
    build:
      context: .
      dockerfile: Dockerfile
    image: keel.local/hello:latest
    ports:
      - "8080:8080"
    environment:
      MESSAGE: "Hello from docker compose!"
      APP_PORT: "8080"
    healthcheck:
      test: ["CMD", "python", "/app/server.py", "--healthcheck"]

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
